<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI先行 — 全球AI工具导航</title>
  <meta name="description" content="AI先行收录全球100+优质AI工具，涵盖对话、绘图、视频、写作、编程等分类，助你第一时间发现最强AI工具。" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Mobile sidebar overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-left">
      <button class="menu-toggle" id="menuToggle" aria-label="切换菜单">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <a class="logo" href="#" onclick="resetAll(); return false;">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">AI先行</span>
      </a>
    </div>

    <div class="header-center">
      <div class="search-wrap">
        <svg class="search-icon-svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="搜索AI工具名称或描述..."
          autocomplete="off"
        />
        <span class="search-clear" id="searchClear" style="display:none">✕</span>
        <kbd class="search-kbd">⌘K</kbd>
      </div>
    </div>

    <div class="header-right">
      <button class="theme-btn" id="themeBtn" aria-label="切换主题" title="切换主题">
        <svg id="themeIconMoon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="themeIconSun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <a class="submit-tool-btn" href="mailto:contact@ai-xianxingzhe.cn" title="提交你发现的好工具">+ 提交工具</a>
    </div>
  </header>

  <!-- ===== LAYOUT ===== -->
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">
        <div class="sidebar-section">
          <p class="sidebar-label">工具分类</p>
          <nav class="cat-list" id="catList"><!-- JS render --></nav>
        </div>
        <div class="sidebar-section">
          <p class="sidebar-label">快速筛选</p>
          <div class="filter-tags" id="filterTags">
            <button class="ftag active" data-tag="all">全部</button>
            <button class="ftag" data-tag="免费">🆓 免费</button>
            <button class="ftag" data-tag="付费">💳 付费</button>
            <button class="ftag" data-tag="国产">🇨🇳 国产</button>
            <button class="ftag" data-tag="热门">🔥 热门</button>
            <button class="ftag" data-tag="开源">📖 开源</button>
          </div>
        </div>
        <div class="sidebar-footer">
          <p>AI先行 &copy; 2025</p>
          <p>持续收录全球优质AI工具</p>
        </div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main">

      <!-- Hero (only when category=all & no search) -->
      <section class="hero" id="heroSection">
        <div class="hero-bg"></div>
        <div class="hero-content">
          <div class="hero-badge">🚀 持续更新中</div>
          <h1 class="hero-title">发现最好的 <span class="gradient-text">AI 工具</span></h1>
          <p class="hero-sub">精心收录全球顶级AI工具，分类清晰，助你抢先一步拥抱AI时代</p>
          <div class="hero-stats">
            <div class="hstat"><span class="hstat-num" id="heroTotal">0</span><span class="hstat-label">精选工具</span></div>
            <div class="hstat-divider"></div>
            <div class="hstat"><span class="hstat-num">11</span><span class="hstat-label">工具分类</span></div>
            <div class="hstat-divider"></div>
            <div class="hstat"><span class="hstat-num">每周</span><span class="hstat-label">持续更新</span></div>
          </div>
        </div>
      </section>

      <!-- Content header -->
      <div class="content-head" id="contentHead">
        <div class="content-head-left">
          <h2 class="cat-title" id="catTitle">全部工具</h2>
          <p class="cat-desc" id="catDesc">收录全球优质AI工具，持续更新中</p>
        </div>
        <div class="result-count" id="resultCount"></div>
      </div>

      <!-- Tools grid -->
      <div class="tools-grid" id="toolsGrid"><!-- JS render --></div>

      <!-- Empty state -->
      <div class="empty-state" id="emptyState" style="display:none">
        <div class="empty-icon">🔍</div>
        <h3>没有找到相关工具</h3>
        <p>换个关键词，或者清除筛选条件试试</p>
        <button class="empty-reset-btn" onclick="resetAll()">清除筛选</button>
      </div>

    </main>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
